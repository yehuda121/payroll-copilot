[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback only when DATABASE_URL is unset (host-local).
# Docker Compose and FastAPI always inject DATABASE_URL — that value wins in alembic/env.py.
# Never rely on localhost inside containers; use host "postgres" on the Compose network.
sqlalchemy.url = postgresql+asyncpg://payroll:payroll@localhost:5432/payroll_copilot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
