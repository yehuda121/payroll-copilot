# Default model assignments per agent — swap without code changes.
# Production default: Amazon Bedrock (MODEL_PROVIDER=bedrock in settings).
# Local development: set MODEL_PROVIDER=ollama and use the ollama blocks below
# or override via environment / Settings.
providers:
  default: bedrock

agents:
  payslip_splitter:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  payslip_extractor:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  contract_analyzer:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.1

  compliance_explainer:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.3

  vacation_sick_leave:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  email_parser:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

embeddings:
  provider: bedrock
  model: amazon.titan-embed-text-v2:0
  dimensions: 1024

# Local-only Ollama profiles (used when MODEL_PROVIDER=ollama)
local_ollama:
  default_model: mistral-nemo:12b
  embedding_model: nomic-embed-text
  embedding_dimensions: 768

# Future / unused cloud stubs
cloud_providers:
  openai:
    enabled: false
    model: gpt-4o
  claude:
    enabled: false
    model: claude-sonnet-4-20250514
  gemini:
    enabled: false
    model: gemini-2.0-flash
  azure_openai:
    enabled: false
    deployment: gpt-4o
