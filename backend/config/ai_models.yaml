# Reference model assignments. Runtime provider routing is configured through
# capability-specific environment variables with MODEL_PROVIDER as fallback.
providers:
  default: bedrock

agents:
  payslip_splitter:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  payslip_extractor:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  contract_analyzer:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.1

  compliance_explainer:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.3

  vacation_sick_leave:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

  email_parser:
    provider: bedrock
    model: anthropic.claude-3-5-sonnet-20241022-v2:0
    temperature: 0.0

embeddings:
  provider: bedrock
  model: amazon.titan-embed-text-v2:0
  dimensions: 1024

# Local-only Ollama profiles (used when MODEL_PROVIDER=ollama)
local_ollama:
  default_model: mistral-nemo:12b
  embedding_model: nomic-embed-text
  embedding_dimensions: 768

# Reference cloud profiles (runtime values come from Settings).
cloud_providers:
  openai:
    enabled: true
    model: gpt-5
  claude:
    enabled: false
    model: claude-sonnet-4-20250514
  gemini:
    enabled: false
    model: gemini-2.0-flash
  azure_openai:
    enabled: false
    deployment: gpt-4o
